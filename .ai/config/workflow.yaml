# AWK Configuration (Phaser + Go)
version: "1.2"

project:
  name: "awkit-example-tennis"
  description: "Tennis Battle - real-time multiplayer tennis game (Phaser + Go)"
  type: "monorepo"

repos:
  - name: backend
    path: backend/
    type: directory
    language: go
    go_version: "1.24.x"
    verify:
      build: "go build ./..."
      test: "go test ./..."

  - name: frontend
    path: frontend/
    type: directory
    language: typescript
    node_version: "20"
    package_manager: "npm"
    verify:
      setup: "npm ci 2>/dev/null || npm install"
      build: "npm run build"
      test: "npm run test -- --run"

git:
  integration_branch: "feat/example"
  release_branch: "main"
  commit_format: "[type] subject"

specs:
  base_path: ".ai/specs"
  files:
    requirements: "requirements.md"
    design: "design.md"
    tasks: "tasks.md"
  auto_generate_tasks: true
  active:
    - tennis-battle

tasks:
  format:
    uncompleted: "- [ ]"
    completed: "- [x]"
    optional: "- [ ]*"
  source_priority:
    - audit
    - specs

audit:
  checks:
    - dirty-worktree
    - submodule-sync
    - missing-tests
    - missing-ci
  custom: []

github:
  repo: ""
  labels:
    task: "ai-task"
    in_progress: "in-progress"
    pr_ready: "pr-ready"
    worker_failed: "worker-failed"
    needs_human_review: "needs-human-review"
    review_failed: "review-failed"
    merge_conflict: "merge-conflict"
    needs_rebase: "needs-rebase"

rules:
  kit:
    - git-workflow
  custom: []

agents:
  builtin:
    - pr-reviewer
    - conflict-resolver
  custom: []

timeouts:
  git_seconds: 120
  gh_seconds: 60
  codex_minutes: 30
  gh_retry_count: 3
  gh_retry_base_delay: 2

review:
  score_threshold: 7
  merge_strategy: squash

escalation:
  triggers: []
  max_consecutive_failures: 3
  retry_count: 2
  retry_delay_seconds: 5
  max_single_pr_files: 50
  max_single_pr_lines: 500

feedback:
  enabled: true
  max_history_in_prompt: 10

hooks: {}

worker:
  backend: codex
